# On push of a tag v* (e.g. v0.1.3), build binaries and create a GitHub Release.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: rust-dns-linux-x86_64
            ext: ''
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            asset_name: rust-dns-linux-aarch64
            ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: rust-dns-macos-x86_64
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: rust-dns-macos-aarch64
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: rust-dns-windows-x86_64
            ext: '.exe'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target (if cross-compiling)
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: matrix.ext == ''
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/rust-dns artifact/${{ matrix.asset_name }}
          tar -czvf ${{ matrix.asset_name }}.tar.gz -C artifact ${{ matrix.asset_name }}

      - name: Prepare artifact (Windows)
        if: matrix.ext == '.exe'
        shell: bash
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/rust-dns.exe artifact/${{ matrix.asset_name }}.exe
          tar -czvf ${{ matrix.asset_name }}.tar.gz -C artifact ${{ matrix.asset_name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/*/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
